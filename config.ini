# ------------------------------
# OBS
# ------------------------------
[OBS]

# 华为云 AccessKey
ak = 

# 华为云 SecretKey
sk = 

# OBS Endpoint，例如 obs.cn-south-1.myhuaweicloud.com
endpoint = obs.cn-south-1.myhuaweicloud.com

# 目标桶名称
bucket = gzjyzx


# ------------------------------
# TASK
# ------------------------------
[TASK]

# 需要迁移的本地目录或文件
local_dir = E:\PythonProject\obs_sync_check

# OBS 目标前缀
obs_prefix = test_0312/


# ------------------------------
# UPLOAD
# ------------------------------
[UPLOAD]

# 上传并发线程数 (推荐 16-64)
workers = 64

# 分片大小 (例如 64M)
part_size = 128M

# 超过该大小启用分片上传
multipart_threshold = 300M

# 失败重试次数
retry = 3

# API QPS 限制
rate_limit = 10000


# ------------------------------
# SCAN
# ------------------------------
[SCAN]

# 扫描线程数 (推荐 2-8，目录多时可调大)
scan_workers = 128

# 扫描批次
batch_size = 5000

# 任务队列最大长度
queue_size = 20000


# ------------------------------
# CHECK
# ------------------------------
[CHECK]

# 是否启用 ETAG 校验（最准确但最慢）
enable_etag_check = false

# 是否启用 HEAD 校验（更准确但更慢）
enable_head_check = true

# client 未初始化是否报错（true=严格模式）
strict_client_check = true


# ------------------------------
# PATH
# ------------------------------
[PATH]

# 日志目录
log_dir = ./logs

# 断点数据库目录
state_dir = ./state

# 失败任务目录
failed_dir = ./failed


# ------------------------------
# UI
# ------------------------------
[UI]

# 启动时是否允许交互修改配置
prompt_config = true

# 是否显示实时仪表盘
show_dashboard = true


