# 本文件用于提交到仓库，请勿写入真实密钥。
# 真实配置建议保存在仓库外，并通过环境变量 OBS_MIGRATE_CONFIG 指向它。
# 所有相对路径都会相对本配置文件所在目录解析。

# ------------------------------
# SOURCE
# ------------------------------
[SOURCE]

# 源端模式：local 或 s3
type = s3

# 源端选择模式：directory 目录模式（一对一）或 list 列表模式（多目录/文件/对象）
selection_mode = directory

# 源端本地目录、单文件路径或通配符（source.type=local 时使用，例如 /data/202604*）
path =

# 源端对象存储 AccessKey（source.type=s3 时使用）
ak =

# 源端对象存储 SecretKey（source.type=s3 时使用）
sk =

# 源端对象存储 Endpoint（source.type=s3 时使用，支持 OBS / 其他 S3 兼容服务）
endpoint =

# 源端桶名称（source.type=s3 时使用）
bucket =

# 源端前缀（可为空，source.type=s3 时使用）
prefix =


# ------------------------------
# TARGET
# ------------------------------
[TARGET]

# 目标端模式：local 或 s3
type = s3

# 目标端本地根目录（target.type=local 时使用）
path =

# 目标端对象存储 AccessKey（target.type=s3 时使用）
ak =

# 目标端对象存储 SecretKey（target.type=s3 时使用）
sk =

# 目标端对象存储 Endpoint（target.type=s3 时使用，支持 OBS / 其他 S3 兼容服务）
endpoint =

# 目标端桶名称（target.type=s3 时使用）
bucket =

# 目标端前缀（可为空，target.type=s3 时使用）
prefix =


# ------------------------------
# UPLOAD
# ------------------------------
[UPLOAD]

# 传输并发线程数（上传 / 下载 / 复制，推荐 16-64）
workers = 32

# 检查阶段并发线程数（扫描后、传输前的存在性判断）
checkers = 16

# 分片大小（例如 64M / 128M）
part_size = 64M

# 超过该大小启用分片传输
multipart_threshold = 128M

# 任务级失败重试次数
retry = 3

# 目标端 API 基础 QPS 限制（0 表示不限制）
rate_limit = 200

# 目标端 API 突发 QPS 上限（建议大于等于 rate_limit）
rate_limit_burst = 400

# 底层请求重试次数（HEAD / copy / multipart 等）
low_level_retries = 5

# 底层请求重试基础等待秒数
low_level_retry_sleep = 0.5

# 最大网络连接数上限（0 表示不限制）
max_connections = 256

# 单个大文件的分片并发数
multipart_concurrency = 4

# 分片流式缓冲总预算（例如 512M，0 表示不限制）
max_buffer_memory = 512M

# 单次请求超时秒数
request_timeout = 60

# worker 无心跳判定秒数（用于卡死探测）
worker_stall_timeout = 300


# ------------------------------
# SCAN
# ------------------------------
[SCAN]

# 扫描线程数上限（本地/对象存储通用，会按队列压力自适应调整）
scan_workers = 4

# 单批扫描入队数量
batch_size = 1000

# 检查队列与传输队列的最大长度
queue_size = 20000


# ------------------------------
# CHECK
# ------------------------------
[CHECK]

# 上传前是否启用 ETAG 比对
enable_etag_check = false

# 上传前是否启用 HEAD 校验
enable_head_check = true

# 客户端未初始化时是否直接报错退出
strict_client_check = true

# 目标端比较模式：auto / hybrid / index_only / head_only
target_compare_mode = auto

# 传输后校验模式：none / size / etag / head
verify_after_upload = head


# ------------------------------
# PATH
# ------------------------------
[PATH]

# 日志目录（相对配置文件目录解析）
log_dir = ./logs

# 断点数据库目录（tasks.db 会写到这里）
state_dir = ./state

# 失败任务目录（失败明细 / 补偿任务）
failed_dir = ./failed

# 源端列表模式清单文件（相对配置文件目录解析，默认 migration_list.txt）
migration_list_file = ./migration_list.txt


# ------------------------------
# UI
# ------------------------------
[UI]

# 启动时是否允许交互修改配置（支持直接输入编号修改）
prompt_config = true

# 是否显示实时仪表盘
show_dashboard = true

# 界面语言：zh（中文双语）或 en（English）
language = zh


# ------------------------------
# WEB_UI
# ------------------------------
[WEB_UI]

# 是否启用 Web 控制台
enabled = false

# Web 控制台监听地址
host = 127.0.0.1

# Web 控制台监听端口
port = 8765

# Web 控制台是否要求登录
require_login = true

# Web 控制台登录用户名
username = admin

# Web 控制台登录密码
password = admin

# 启动 Web 控制台后是否自动打开浏览器
auto_open = false
