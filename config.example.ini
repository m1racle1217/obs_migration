# 本文件用于提交到仓库，请勿写入真实密钥。
# 真实配置建议保存在仓库外，并通过环境变量 OBS_MIGRATE_CONFIG 指向它。

[SOURCE]
type = s3
path =
ak =
sk =
endpoint =
bucket =
prefix =

[TARGET]
type = s3
path =
ak =
sk =
endpoint =
bucket =
prefix =

[UPLOAD]
workers = 32
part_size = 64M
multipart_threshold = 128M
retry = 3
rate_limit = 200

[SCAN]
scan_workers = 4
batch_size = 1000
queue_size = 20000

[CHECK]
enable_etag_check = false
enable_head_check = true
strict_client_check = true

[PATH]
log_dir = ./logs
state_dir = ./state
failed_dir = ./failed

[UI]
prompt_config = true
show_dashboard = true
